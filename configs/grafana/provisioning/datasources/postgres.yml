apiVersion: 1
datasources:
  - name: dobby-audit
    uid: dobby-audit   # stable uid so provisioned dashboards can pin it
    type: postgres
    access: proxy
    url: postgres:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
