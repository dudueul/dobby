# Snapserver — synchronized whole-house audio fan-out.
# Music Assistant feeds this stream; one snapclient per room subscribes.

[stream]
# Music Assistant writes PCM to this FIFO (configure MA's Snapcast provider).
source = pipe:///data/snapfifo?name=House&sampleformat=48000:16:2&codec=flac
chunk_ms = 20
buffer = 800

[http]
enabled = true
bind_to_address = 0.0.0.0
port = 1780
doc_root = /usr/share/snapserver/snapweb

[tcp]
enabled = true
port = 1705

[logging]
sink = stdout
filter = *:info
