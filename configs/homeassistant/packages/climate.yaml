# Climate / HVAC automations for the TWO-ZONE heat pump (TrueZONE HZ221 panel,
# one Honeywell T6 Pro Z-Wave per zone -> climate.zone_1 / climate.zone_2).
# Temperatures are °F (US). Rename the entities per the rooms each zone serves.
#
# IMPORTANT: O/B convention, staging, dampers, and Em-Heat live ON THE HZ221
# PANEL; compressor anti-short-cycle lives ON THE THERMOSTATS — so everything
# survives a hub crash. HA only writes setpoints/modes and reads state.

input_number:
  hvac_comfort_heat: { name: Comfort heat, min: 60, max: 78, step: 1, initial: 68, unit_of_measurement: "°F" }
  hvac_comfort_cool: { name: Comfort cool, min: 68, max: 82, step: 1, initial: 75, unit_of_measurement: "°F" }
  hvac_eco_heat:     { name: Eco/away heat, min: 50, max: 68, step: 1, initial: 62, unit_of_measurement: "°F" }
  hvac_eco_cool:     { name: Eco/away cool, min: 74, max: 90, step: 1, initial: 80, unit_of_measurement: "°F" }
  hvac_freeze_floor: { name: Freeze-protection floor, min: 40, max: 55, step: 1, initial: 45, unit_of_measurement: "°F" }

input_datetime:
  hvac_manual_touch: { name: HVAC last manual change, has_date: true, has_time: true }

automation:
  # Any human setpoint touch on either zone backs automation off for 2 hours
  # across BOTH zones — don't fight the household.
  - id: hvac_record_manual_touch
    alias: "HVAC: record manual setpoint touch"
    trigger:
      - platform: state
        entity_id: [climate.zone_1, climate.zone_2]
        attribute: temperature
    condition:
      - condition: template
        value_template: "{{ trigger.context.user_id is not none }}"
    action:
      - service: input_datetime.set_datetime
        target: { entity_id: input_datetime.hvac_manual_touch }
        data: { datetime: "{{ now().isoformat() }}" }

  # Away setback — both zones get the eco setpoint. The HZ221 runs one mode
  # system-wide, so zone_1's state is a sound season proxy for both.
  - id: hvac_away_setback
    alias: "HVAC: eco setback when away/night"
    trigger:
      - platform: state
        entity_id: input_select.house_mode
        to: [away, night]
    condition:
      - condition: template
        value_template: >
          {{ (now() - (states('input_datetime.hvac_manual_touch') | as_datetime
              | default(now() - timedelta(hours=3)))).total_seconds() > 7200 }}
    action:
      - service: climate.set_temperature
        target: { entity_id: [climate.zone_1, climate.zone_2] }
        data:
          temperature: >
            {% if is_state_attr('climate.zone_1','hvac_action','cooling')
                  or state_attr('climate.zone_1','temperature')|float(70) >= 74 %}
              {{ states('input_number.hvac_eco_cool') }}
            {% else %}
              {{ states('input_number.hvac_eco_heat') }}
            {% endif %}

  # Restore comfort on return home — both zones.
  - id: hvac_home_restore
    alias: "HVAC: restore comfort when home"
    trigger:
      - platform: state
        entity_id: input_select.house_mode
        to: home
    action:
      - service: climate.set_temperature
        target: { entity_id: [climate.zone_1, climate.zone_2] }
        data:
          temperature: >
            {% if state_attr('climate.zone_1','hvac_action') == 'cooling' %}
              {{ states('input_number.hvac_comfort_cool') }}
            {% else %}
              {{ states('input_number.hvac_comfort_heat') }}
            {% endif %}

  # Hub-level freeze-protection safety net, per zone (the stats should also
  # enforce their own low limit; this is a backstop). Forces heat on the zone
  # whose indoor temperature drops below the floor, regardless of house mode.
  - id: hvac_freeze_protection
    alias: "HVAC: freeze protection floor"
    trigger:
      - platform: numeric_state
        entity_id: [climate.zone_1, climate.zone_2]
        attribute: current_temperature
        below: input_number.hvac_freeze_floor
    action:
      - service: climate.set_hvac_mode
        target: { entity_id: "{{ trigger.entity_id }}" }
        data: { hvac_mode: heat }
      - service: climate.set_temperature
        target: { entity_id: "{{ trigger.entity_id }}" }
        data: { temperature: "{{ states('input_number.hvac_freeze_floor')|int + 3 }}" }
      - service: notify.dobby_push
        data:
          title: "❄️ HVAC freeze protection engaged"
          message: "{{ trigger.entity_id }} at {{ state_attr(trigger.entity_id,'current_temperature') }}°F — forcing heat."
          data: { tier: critical }

  # Operational incident: either zone's thermostat going dark.
  - id: hvac_operational_incident
    alias: "HVAC: operational incident"
    trigger:
      - platform: state
        entity_id: [climate.zone_1, climate.zone_2]
        to: [unavailable, unknown]
        for: "00:05:00"
    action:
      - service: persistent_notification.create
        data:
          title: "HVAC incident"
          message: "{{ trigger.entity_id }} is {{ trigger.to_state.state }} — check the thermostat / Z-Wave."
      - service: notify.dobby_push
        data:
          message: "Incident: {{ trigger.entity_id }} unavailable."
          data: { tier: critical }
