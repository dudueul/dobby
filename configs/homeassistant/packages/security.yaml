# Security & correlation — live notifications. The forensic versions of these
# rules are also computed by event-correlator so they survive HA being disabled.

template:
  - binary_sensor:
      - name: Quiet hours
        state: >
          {{ now().hour >= 22 or now().hour < 7
             or is_state('input_select.house_mode','night') }}

automation:
  - id: sec_snapshot_on_unlock
    alias: "Security: snapshot every unlock"
    trigger:
      - platform: state
        entity_id:
          - lock.front_door_nuki
          - lock.back_door_nuki
        to: unlocked
    action:
      - service: camera.snapshot
        target:
          entity_id: "camera.{{ trigger.entity_id.split('.')[1].replace('_nuki','') }}"
        data:
          filename: "/media/frigate/snap/{{ trigger.entity_id.split('.')[1] }}_{{ now().strftime('%Y%m%d_%H%M%S') }}_unlock.jpg"
      - service: notify.dobby_push
        data:
          title: "Unlocked: {{ trigger.to_state.attributes.friendly_name }}"
          message: "{{ now().strftime('%H:%M') }} via {{ state_attr(trigger.entity_id,'last_access_method') | default('unknown') }}"

  - id: sec_unlock_no_person
    alias: "Security: unlock with no person seen"
    trigger:
      - platform: state
        entity_id: [lock.front_door_nuki, lock.back_door_nuki]
        to: unlocked
    condition:
      # No Frigate person at that door in the last 10s and not arriving in 30s.
      - condition: template
        value_template: >
          {{ (now() - states.binary_sensor.front_door_person.last_changed).total_seconds() > 10 }}
    action:
      - delay: "00:00:30"
      - condition: state
        entity_id: binary_sensor.front_door_person
        state: "off"
      - service: notify.dobby_push
        data:
          title: "⚠️ Unlock with no person seen"
          message: "{{ trigger.to_state.attributes.friendly_name }} unlocked but no camera person event."

  - id: sec_night_person_no_unlock
    alias: "Security: night person, no known unlock"
    trigger:
      - platform: state
        entity_id: binary_sensor.front_door_person
        to: "on"
    condition:
      - condition: state
        entity_id: binary_sensor.quiet_hours
        state: "on"
      - condition: template
        value_template: >
          {{ (now() - states.lock.front_door_nuki.last_changed).total_seconds() > 60 }}
    action:
      - service: notify.dobby_push
        data:
          title: "⚠️ Night person at door"
          message: "Person detected at the front door at night with no recent unlock."
      - service: light.turn_on
        target: { entity_id: light.front_porch }

  - id: sec_door_left_open
    alias: "Security: door left open"
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.front_door_contact   # wired via Konnected (docs/13)
          - binary_sensor.side_door_contact    # wired via Konnected (docs/13)
          - binary_sensor.back_door_contact
        to: "on"
        for: "00:05:00"
    action:
      - service: notify.dobby_push
        data:
          title: "Door left open"
          message: "{{ trigger.to_state.attributes.friendly_name }} open > 5 min."

  - id: sec_operational_incidents
    alias: "Security: operational incidents"
    trigger:
      - platform: state
        entity_id: [binary_sensor.front_door_camera_problem]
        to: "on"
      - platform: numeric_state
        entity_id: sensor.front_door_nuki_battery
        below: 15
    action:
      - service: persistent_notification.create
        data:
          title: "Operational incident"
          message: "{{ trigger.to_state.attributes.friendly_name }} = {{ trigger.to_state.state }}"
      - service: notify.dobby_push
        data:
          message: "Incident: {{ trigger.to_state.attributes.friendly_name }}"
