name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel a superseded run when new commits land on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: pip install --quiet pytest pyyaml

      - name: Byte-compile services
        run: |
          python -m py_compile \
            services/nuki-ingestor/main.py \
            services/event-correlator/main.py \
            services/event-correlator/intrusion.py \
            services/event-correlator/test_intrusion.py \
            services/archive-job/archive.py \
            services/archive-job/test_archive.py

      - name: Pure-domain unit tests
        run: |
          python -m pytest -q services/archive-job/test_archive.py
          python -m pytest -q services/event-correlator/test_intrusion.py

      - name: Validate YAML / JSON configs
        run: python provisioning/validate-configs.py

      - name: Lint docker-compose
        run: |
          cp .env.example .env
          docker compose config -q
          echo "docker compose config OK"

      - name: Shell scripts parse
        run: bash -n provisioning/*.sh

  control-panel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/control-panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
