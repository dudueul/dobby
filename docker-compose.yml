# dobby — full home security + smart-home stack.
# Ports are LAN-only; nothing here is exposed to the internet (see docs/02).
# Bring up postgres + mosquitto first, then the rest.

x-common: &common
  restart: unless-stopped
  environment:
    TZ: ${TZ}

services:
  # ---------- data plane ----------
  postgres:
    <<: *common
    image: postgres:16
    container_name: lockhub_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${DATA_ROOT}/postgres:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    <<: *common
    image: eclipse-mosquitto:2
    container_name: lockhub_mosquitto
    volumes:
      - ./configs/mosquitto:/mosquitto/config:ro
      - ${DATA_ROOT}/mosquitto/data:/mosquitto/data
      - ${DATA_ROOT}/mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"

  # ---------- coordinators ----------
  zigbee2mqtt:
    <<: *common
    image: koenkk/zigbee2mqtt:latest
    container_name: lockhub_zigbee2mqtt
    depends_on: [mosquitto]
    volumes:
      - ./configs/zigbee2mqtt:/app/data
      - /run/udev:/run/udev:ro
    devices:
      - ${ZIGBEE_SERIAL}:/dev/ttyZIGBEE
    ports:
      - "8080:8080"

  zwave-js-ui:
    <<: *common
    image: zwavejs/zwave-js-ui:latest
    container_name: lockhub_zwave
    depends_on: [mosquitto]
    environment:
      TZ: ${TZ}
      SESSION_SECRET: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ${DATA_ROOT}/zwave:/usr/src/app/store
    devices:
      - ${ZWAVE_SERIAL}:/dev/ttyZWAVE
    ports:
      - "8091:8091"   # UI
      - "3001:3000"   # ws server for HA

  esphome:
    <<: *common
    image: ghcr.io/esphome/esphome:latest
    container_name: lockhub_esphome
    network_mode: host
    volumes:
      - ${DATA_ROOT}/esphome:/config

  # ---------- automation brain ----------
  homeassistant:
    <<: *common
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: lockhub_homeassistant
    depends_on: [postgres, mosquitto]
    network_mode: host          # needed for mDNS/Matter/HomeKit discovery
    privileged: true
    volumes:
      - ./configs/homeassistant:/config
      - /run/dbus:/run/dbus:ro
    devices:
      - /dev/dri:/dev/dri        # iGPU for camera stream previews

  # ---------- video ----------
  frigate:
    <<: *common
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: lockhub_frigate
    depends_on: [mosquitto]
    privileged: true
    shm_size: "512mb"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128   # Intel iGPU: QuickSync + OpenVINO
      # NUC8i7HVK: confirm renderD128 is the Intel UHD 630, not the AMD Vega M:
      #   vainfo --display drm --device /dev/dri/renderD128   (map the Intel node)
      # - /dev/accel:/dev/accel                   # Core Ultra NPU only (N/A here)
    environment:
      TZ: ${TZ}
      FRIGATE_RTSP_USER: ${FRIGATE_RTSP_USER}
      FRIGATE_RTSP_PASSWORD: ${FRIGATE_RTSP_PASSWORD}
    volumes:
      - ./configs/frigate:/config
      - ${MEDIA_ROOT}/frigate:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs: { size: 1000000000 }
    ports:
      - "5000:5000"     # UI
      - "8554:8554"     # go2rtc RTSP restream
      - "8555:8555/tcp" # WebRTC
      - "8555:8555/udp"

  scrypted:
    <<: *common
    image: ghcr.io/koush/scrypted:latest
    container_name: lockhub_scrypted
    network_mode: host
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${DATA_ROOT}/scrypted:/server/volume

  # ---------- whole-house audio ----------
  music-assistant:
    <<: *common
    image: ghcr.io/music-assistant/server:latest
    container_name: lockhub_music_assistant
    network_mode: host          # discovery of AirPlay/Chromecast/Sonos/Snapcast
    volumes:
      - ${DATA_ROOT}/music-assistant:/data

  snapserver:
    <<: *common
    image: ghcr.io/sweisgerber-dev/snapcast:latest
    container_name: lockhub_snapserver
    network_mode: host
    volumes:
      - ./configs/snapcast/snapserver.conf:/etc/snapserver.conf:ro
      - ${DATA_ROOT}/snapcast:/data

  # ---------- our services ----------
  nuki-ingestor:
    <<: *common
    build: ./services/nuki-ingestor
    container_name: lockhub_nuki_ingestor
    depends_on: [postgres, mosquitto]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MQTT_HOST: mosquitto
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      NUKI_API_TOKEN: ${NUKI_API_TOKEN}
      NUKI_POLL_SECONDS: ${NUKI_POLL_SECONDS}
      TZ: ${TZ}

  event-correlator:
    <<: *common
    build: ./services/event-correlator
    container_name: lockhub_event_correlator
    depends_on: [postgres, mosquitto]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MQTT_HOST: mosquitto
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MEDIA_ROOT: /media/frigate
      TZ: ${TZ}
    volumes:
      - ${MEDIA_ROOT}/frigate:/media/frigate:ro

  archive-job:
    <<: *common
    build: ./services/archive-job
    container_name: lockhub_archive_job
    restart: "no"               # invoked by the host cron / systemd timer
    depends_on: [postgres]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MEDIA_ROOT: /media/frigate
      B2_BUCKET: ${B2_BUCKET}
      B2_ENDPOINT: ${B2_ENDPOINT}
      B2_KEY_ID: ${B2_KEY_ID}
      B2_APP_KEY: ${B2_APP_KEY}
      ARCHIVE_RECIPIENTS: /secrets/recipients.txt
      RETAIN_FULL_VIDEO_DAYS: ${RETAIN_FULL_VIDEO_DAYS}
      RETAIN_EVENT_VIDEO_DAYS: ${RETAIN_EVENT_VIDEO_DAYS}
      RETAIN_AUDIT_DAYS: ${RETAIN_AUDIT_DAYS}
      DISK_LOW_WATER_PCT: ${DISK_LOW_WATER_PCT}
      TZ: ${TZ}
    volumes:
      - ${MEDIA_ROOT}/frigate:/media/frigate
      - /opt/dobby/secrets:/secrets:ro

  # ---------- dashboards ----------
  grafana:
    <<: *common
    image: grafana/grafana:latest
    container_name: lockhub_grafana
    depends_on: [postgres]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: ${TZ}
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${DATA_ROOT}/grafana:/var/lib/grafana
    ports:
      - "3000:3000"

  # ---------- control panel (BFF + PWA) ----------
  control-panel:
    <<: *common
    build: ./apps/control-panel
    container_name: lockhub_control_panel
    depends_on: [homeassistant, frigate]
    environment:
      HA_BASE_URL: http://homeassistant:8123
      HA_TOKEN: ${HOME_ASSISTANT_TOKEN}
      GO2RTC_URL: http://frigate:1984
      CONTROL_PANEL_PORT: 8088
      VAPID_PUBLIC: ${VAPID_PUBLIC}
      VAPID_PRIVATE: ${VAPID_PRIVATE}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      PUSH_SHARED_SECRET: ${PUSH_SHARED_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_PASSPHRASE_HASH: ${ADMIN_PASSPHRASE_HASH}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      COOKIE_SECURE: ${COOKIE_SECURE}
      TZ: ${TZ}
    volumes:
      - ${DATA_ROOT}/control-panel:/data   # push subscriptions survive restarts
    ports:
      # Loopback-only: the ONLY ingress is `tailscale serve` (TLS) on the host.
      # HA's notify.dobby_push also reaches this via host loopback.
      - "127.0.0.1:8088:8088"
